# go2rtc config for the HA Advanced Camera Card full-duplex intercom.
# Runs as a container alongside the intercom (we control it — HA's BUILT-IN go2rtc
# can't define exec sources). The card points at THIS go2rtc.
#
# Secrets: ${INTERCOM_API_KEY} is substituted from the env (set in docker-compose
# from .env). The API key is NOT written here — do not hardcode it.

streams:
  frontdoor:
    # DOWNLINK: low-latency H264 + Opus pulled from the intercom's WebRTC RTSP path.
    - rtsp://intercom:8554/frontdoor_webrtc
    # UPLINK (two-way audio backchannel): the card's mic arrives here over WebRTC;
    # go2rtc pipes it to this ffmpeg's stdin, which transcodes to 16k mono PCM and
    # POSTs it to the intercom's /talk/stream (→ TalkbackSession → door). 'backchannel=1'
    # marks this as the return-audio SINK.
    # CRITICAL: the backchannel codec MUST be one the BROWSER actually sends over
    # WebRTC. Browsers offer OPUS / PCMU / PCMA / G722 — NOT raw s16le. With
    # audio=s16le/16000 the codecs never matched, go2rtc never connected the mic to
    # this exec, and it never ran. Use alaw/8000 (PCMA) — a browser-native codec —
    # as the pipe format, and let ffmpeg transcode a-law@8k → s16le@16k for the door.
    - exec:ffmpeg -hide_banner -loglevel error -f alaw -ar 8000 -ac 1 -i -
        -ar 16000 -ac 1 -f s16le
        -content_type application/octet-stream -method POST
        "http://intercom:8000/talk/stream?key=${INTERCOM_API_KEY}&rate=16000"#backchannel=1#audio=pcma/8000

webrtc:
  # WebRTC for the card. Media UDP on 8555 (distinct from the intercom's 8189).
  listen: ":8555"
  candidates:
    - 192.168.20.203:8555

api:
  listen: ":1984"   # go2rtc API + web UI (the card connects here)
  # Allow cross-origin WebSocket from the HA dashboard. The Advanced Camera Card
  # connects to go2rtc over a WebSocket from https://ha.app.vanheerden.ch; without
  # this, go2rtc rejects it ("request origin not allowed by Upgrader.CheckOrigin")
  # and the card shows "Waiting for live stream to load". (The webrtc-camera card on
  # the Live tab uses a different path and isn't affected.)
  origin: "*"

rtsp:
  listen: ":8553"   # go2rtc's own RTSP (avoid clashing with intercom's 8554)
