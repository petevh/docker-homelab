services:
  intercom:
    build: .
    container_name: intercom
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8554:8554"   # RTSP (H264 passthrough + audio) for Home Assistant
      - "8189:8189/udp"   # WebRTC media (DTLS-SRTP, self-encrypted) — talk-ui downlink [spike]
    networks:
      - traefik
      - intercom-internal   # shared with go2rtc (it reaches intercom:8000/8554)
    environment:
      # API auth — named, individually-revocable keys ("label:key,...")
      - DAHUA_API_KEYS=${DAHUA_API_KEYS:-}
      - DAHUA_API_KEY=${DAHUA_API_KEY:-}   # legacy single key (optional fallback)
      # Cloud API (unlock + stream)
      - DAHUA_ACCOUNT=${DAHUA_ACCOUNT:-}
      - DAHUA_ACCOUNT_PASSWORD=${DAHUA_ACCOUNT_PASSWORD:-}
      - DAHUA_AREA_CODE=${DAHUA_AREA_CODE:-971}
      - DAHUA_COUNTRY=${DAHUA_COUNTRY:-AE}
      - DAHUA_BEARER_TOKEN=${DAHUA_BEARER_TOKEN:-}
      - DAHUA_PCS_USERNAME=${DAHUA_PCS_USERNAME}
      - DAHUA_DEVICE_SN=${DAHUA_DEVICE_SN}
      - DAHUA_DEVICE_USERNAME=${DAHUA_DEVICE_USERNAME:-user}
      - DAHUA_DEVICE_PASSWORD=${DAHUA_DEVICE_PASSWORD}
      - DAHUA_CHANNEL=${DAHUA_CHANNEL:-1}
      - DAHUA_DOOR_INDEX=${DAHUA_DOOR_INDEX:-0}
      # Talkback (push audio to door speaker); hard backstop against stuck-open mic
      - DAHUA_TALK_MAX_SECONDS=${DAHUA_TALK_MAX_SECONDS:-180}
      - DAHUA_TALK_HANDSHAKE_GAP=${DAHUA_TALK_HANDSHAKE_GAP:-0.05}   # talk handshake pacing (latency)
      # AES-128-ECB talk encryption key (hex) — required for talkback audio
      - DAHUA_TALK_AES_KEY=${DAHUA_TALK_AES_KEY:-}
      # Stream output: STREAM 0=main/HD 1280x720, 1=sub 352x288; WIDTH 0=native
      - DAHUA_STREAM=${DAHUA_STREAM:-0}
      - DAHUA_STREAM_WIDTH=${DAHUA_STREAM_WIDTH:-0}
      - DAHUA_STREAM_QUALITY=${DAHUA_STREAM_QUALITY:-5}
      # Last-frame snapshot cache — lets /frame serve an instant stale image on
      # a cold start instead of a black screen. In-container path (/tmp): survives
      # a restart, resets on rebuild (first open after a rebuild waits for live).
      - DAHUA_FRAME_CACHE=/tmp/frontdoor_last.jpg
      # Optional: push doorbell rings straight to a Home Assistant webhook
      - HA_WEBHOOK_URL=${HA_WEBHOOK_URL:-}
      # Direct VTH connection (doorbell event subscription)
      - DAHUA_VTH_HOST=${DAHUA_VTH_HOST}
      - DAHUA_VTH_PORT=${DAHUA_VTH_PORT:-5000}
      - DAHUA_VTH_USERNAME=${DAHUA_VTH_USERNAME:-user}
      - DAHUA_VTH_PASSWORD=${DAHUA_VTH_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.intercom.loadbalancer.server.port=8000"
      # Middleware defs
      # Rate limiting — protects /unlock etc. from brute force
      - "traefik.http.middlewares.dahua-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.dahua-ratelimit.ratelimit.burst=5"
      - "traefik.http.middlewares.dahua-ratelimit.ratelimit.period=1m"
      # Tailscale IP allowlist — only Tailscale CGNAT range + home LAN
      - "traefik.http.middlewares.dahua-ipallowlist.ipallowlist.sourcerange=100.64.0.0/10,192.168.0.0/16"

      # Streaming router (HLS/MJPEG/talk page+ws): IP-allowlist ONLY, NO rate-limit
      # — HLS pulls many segments/min and would trip the limiter. Higher priority.
      - "traefik.http.routers.intercom-stream.rule=Host(`intercom.app.vanheerden.ch`) && (PathPrefix(`/hls`) || PathPrefix(`/stream`) || PathPrefix(`/talk`) || Path(`/talk-ui`) || Path(`/hls.min.js`) || Path(`/frame`))"
      - "traefik.http.routers.intercom-stream.priority=100"
      - "traefik.http.routers.intercom-stream.entrypoints=websecure"
      - "traefik.http.routers.intercom-stream.tls=true"
      - "traefik.http.routers.intercom-stream.tls.certresolver=cloudflare"
      - "traefik.http.routers.intercom-stream.middlewares=dahua-ipallowlist"

      # Main router (everything else incl. /unlock): rate-limit + IP-allowlist
      - "traefik.http.routers.intercom.rule=Host(`intercom.app.vanheerden.ch`)"
      - "traefik.http.routers.intercom.priority=1"
      - "traefik.http.routers.intercom.entrypoints=websecure"
      - "traefik.http.routers.intercom.tls=true"
      - "traefik.http.routers.intercom.tls.certresolver=cloudflare"
      - "traefik.http.routers.intercom.middlewares=dahua-ratelimit,dahua-ipallowlist"

  # go2rtc for the HA Advanced Camera Card full-duplex intercom. We run our OWN
  # instance (HA's built-in go2rtc can't define the exec backchannel). Downlink =
  # the intercom's frontdoor_webrtc (Opus); uplink = card mic → exec ffmpeg →
  # intercom /talk/stream. The Advanced Camera Card points at this go2rtc (port 1984).
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: intercom-go2rtc
    restart: unless-stopped
    depends_on:
      - intercom
    networks:
      - traefik
      - intercom-internal
    ports:
      - "1984:1984"        # go2rtc API + web UI (the card connects here)
      - "8555:8555/tcp"    # WebRTC media (TCP)
      - "8555:8555/udp"    # WebRTC media (UDP)
    environment:
      # Intercom API key (the 'ha' label value) for the exec backchannel POST to
      # /talk/stream. From .env — NOT committed.
      - INTERCOM_API_KEY=${INTERCOM_API_KEY}
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    labels:
      # HTTPS access to go2rtc's API/UI so its built-in WebRTC test page works in a
      # secure context (the browser mic / getUserMedia needs HTTPS). IP-allowlisted
      # (Tailscale + home LAN) like the intercom; reuses the dahua-ipallowlist mw.
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.go2rtc.rule=Host(`intercom-go2rtc.app.vanheerden.ch`)"
      - "traefik.http.routers.go2rtc.entrypoints=websecure"
      - "traefik.http.routers.go2rtc.tls=true"
      - "traefik.http.routers.go2rtc.tls.certresolver=cloudflare"
      - "traefik.http.routers.go2rtc.middlewares=dahua-ipallowlist"
      - "traefik.http.services.go2rtc.loadbalancer.server.port=1984"

networks:
  traefik:
    external: true
  intercom-internal:
    driver: bridge
