<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Front Door</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; background:#111; color:#eee; font-family:-apple-system,system-ui,sans-serif;
         display:flex; flex-direction:column; height:100dvh; }
  header { padding:10px 14px; font-size:18px; font-weight:600; background:#1b1b1b; }
  #video { width:100%; height:100%; min-height:0; background:#000; object-fit:contain; }
  #status { padding:6px 14px; font-size:13px; color:#9aa; min-height:22px; }
  .controls { display:flex; gap:10px; padding:14px; padding-bottom:max(14px,env(safe-area-inset-bottom)); background:#1b1b1b; }
  button { flex:1; border:0; border-radius:14px; padding:18px 8px; font-size:16px; font-weight:600;
           color:#fff; background:#333; transition:background .1s; touch-action:manipulation; }
  button:active { filter:brightness(1.3); }
  #talk.on { background:#2e7d32; }
  #talk { background:#37474f; }
  #unlock { background:#1565c0; }
  #mute { background:#37474f; }
  #mute.muted { background:#b71c1c; }
  .icon { font-size:22px; display:block; margin-bottom:4px; }
  /* DMSS-style live mic indicator, overlaid on the video while transmitting */
  #video-wrap { flex:1; min-height:0; position:relative; display:flex; background:#000; }
  /* Instant snapshot shown while HLS warms up; crossfades out when video plays. */
  #snap { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
          background:#000; opacity:0; transition:opacity .4s ease; pointer-events:none; z-index:1; }
  #snap.show { opacity:1; }
  #video { position:relative; z-index:0; }
  #micind { z-index:2; }
  #micind { position:absolute; top:10px; left:10px; display:none; align-items:center; gap:8px;
            padding:7px 12px 7px 10px; border-radius:20px; background:rgba(20,20,20,.62);
            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  #micind.on { display:flex; }
  #micind .dot { width:9px; height:9px; border-radius:50%; background:#2e7d32;
                 box-shadow:0 0 0 0 rgba(46,125,50,.7); animation:micpulse 1.4s infinite; }
  #micind .mi { font-size:16px; line-height:1; }
  #micind .lbl { font-size:13px; font-weight:600; color:#eee; letter-spacing:.2px; }
  #micbars { display:flex; align-items:flex-end; gap:3px; height:18px; margin-left:2px; }
  #micbars i { width:3px; height:3px; border-radius:2px; background:#7cd67c; transition:height .06s linear; }
  @keyframes micpulse { 0%{box-shadow:0 0 0 0 rgba(46,125,50,.7);} 70%{box-shadow:0 0 0 9px rgba(46,125,50,0);} 100%{box-shadow:0 0 0 0 rgba(46,125,50,0);} }
</style>
</head>
<body>
<header>🔔 Front Door</header>
<div id="video-wrap">
  <img id="snap" alt="">
  <video id="video" autoplay playsinline></video>
  <div id="micind">
    <span class="dot"></span><span class="mi">🎙️</span><span class="lbl">On air</span>
    <span id="micbars"><i></i><i></i><i></i><i></i><i></i></span>
  </div>
</div>
<div id="status">connecting…</div>
<div class="controls">
  <button id="mute"><span class="icon">🔊</span>Mute</button>
  <button id="talk"><span class="icon">🎙️</span>Talk</button>
  <button id="unlock"><span class="icon">🔓</span>Unlock</button>
</div>
<script>
const KEY = new URLSearchParams(location.search).get('key') || '';
const $ = id => document.getElementById(id);
let _log=[];
const status = m => { _log.push(m); $('status').textContent = _log.slice(-4).join(' | '); console.log('[talk]',m); };
window.onerror = (msg,src,ln) => status('JSERR: '+msg+' @'+ln);
status('page loaded, key='+(KEY?('set('+KEY.length+')'):'MISSING'));

// ---- Instant snapshot while the HLS stream warms up ----
// /frame returns the latest JPEG AND wakes the on-demand relay (which HLS needs),
// so showing it on load doubles as the stream warm-up trigger. It fades out the
// moment live video starts; if the stream never comes up it stays as a fallback.
// Show the cached snapshot ONCE on load, then crossfade to live video when HLS
// plays. No refresh loop: a fresh /frame becomes ready at ~the same time as the
// video (both gated by the relay+ffmpeg cold-start), so re-fetching the stale
// image while waiting adds nothing. The /frame request also wakes the relay.
const snap = $('snap');
let videoLive=false;
snap.onload = () => { if(!videoLive) snap.classList.add('show'); };
snap.src = `/frame?key=${encodeURIComponent(KEY)}&t=${Date.now()}`;
function hideSnap(){ videoLive=true; snap.classList.remove('show'); }

// ---- Downlink: WebRTC (WHEP, low-latency) with HLS fallback ----
// Try WebRTC first for sub-second downlink; if ICE/media fails to connect we
// fall back to HLS so the page always works. Signaling is same-origin (/whep,
// via Traefik/HTTPS); media is direct UDP (self-encrypted, no cert).
const vid = $('video');
const hlsUrl = `/hls/frontdoor/index.m3u8`;
let downlinkChosen=false;   // once WebRTC OR HLS is playing, don't switch
vid.onplaying = () => { status('VIDEO PLAYING'); hideSnap(); downlinkChosen=true; };
vid.onstalled = () => status('video stalled');
vid.onerror = () => status('video el error: '+(vid.error&&vid.error.code));

// Downlink with AUTO-RECOVERY: prefer WebRTC; if it drops (disconnected/failed/
// closed) reconnect WebRTC a few times before falling back to HLS; if HLS also
// fails, keep retrying. A doorbell must self-heal, not get stuck on a dead frame.
let pc=null, webrtcTries=0, hlsActive=false, recovering=false;
const MAX_WEBRTC_TRIES=4;

function teardownPc(){ try{ pc&&pc.close(); }catch(e){} pc=null; }

function recoverDownlink(why){
  if(recovering) return; recovering=true;
  status('downlink lost ('+why+') — recovering…');
  teardownPc();
  // give the server a moment (it may be mid relay-rotation/ffmpeg restart)
  setTimeout(()=>{ recovering=false;
    if(webrtcTries < MAX_WEBRTC_TRIES){ useWebRTC(); }
    else { status('webrtc exhausted → HLS'); useHlsJs(); }
  }, 1500);
}

async function useWebRTC(){
  webrtcTries++;
  hlsActive=false;
  try{
    status('webrtc: negotiating… ('+webrtcTries+')');
    pc = new RTCPeerConnection();
    pc.addTransceiver('video', {direction:'recvonly'});
    pc.addTransceiver('audio', {direction:'recvonly'});
    pc.ontrack = ev => { if(vid.srcObject!==ev.streams[0]){ vid.srcObject = ev.streams[0]; vid.play().catch(()=>{}); } };
    pc.onconnectionstatechange = () => {
      const st = pc ? pc.connectionState : 'closed';
      status('webrtc: '+st);
      if(st==='connected'){ webrtcTries=0; }   // healthy → reset retry budget
      else if(st==='failed' || st==='disconnected' || st==='closed'){
        recoverDownlink(st);
      }
    };
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    const r = await fetch('/whep/frontdoor_webrtc/whep', {
      method:'POST', headers:{'Content-Type':'application/sdp'}, body:offer.sdp
    });
    if(!r.ok){ throw new Error('whep '+r.status); }
    const answer = await r.text();
    await pc.setRemoteDescription({type:'answer', sdp:answer});
  }catch(e){
    status('webrtc error ('+e.message+')');
    recoverDownlink('offer-error');
  }
}
let hlsObj=null;
function useHlsJs(){
  if(hlsActive) return; hlsActive=true;
  vid.srcObject = null;   // drop any dead WebRTC stream before HLS attaches
  const start = () => {
    if (window.Hls && Hls.isSupported()) {
      if(hlsObj){ try{hlsObj.destroy();}catch(e){} }
      hlsObj = new Hls({liveSyncDurationCount:1, liveMaxLatencyDurationCount:5, lowLatencyMode:true});
      hlsObj.loadSource(hlsUrl); hlsObj.attachMedia(vid);
      hlsObj.on(Hls.Events.MANIFEST_PARSED, ()=>{ status('manifest ok'); vid.play().catch(e=>status('tap video ('+e.name+')')); });
      hlsObj.on(Hls.Events.ERROR, (e,d)=>{
        status('hls '+(d.fatal?'FATAL ':'')+d.type+'/'+d.details);
        if(d.fatal){
          // self-heal instead of dying (ffmpeg restarts make the playlist blip).
          // Periodically retry WebRTC too — it may have recovered server-side.
          if(d.type===Hls.ErrorTypes.NETWORK_ERROR){ try{hlsObj.startLoad();}catch(_){ } }
          else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){ try{hlsObj.recoverMediaError();}catch(_){ } }
          else { try{hlsObj.destroy();}catch(_){ } hlsObj=null; hlsActive=false; setTimeout(useHlsJs,2000); }
        }
      });
    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      vid.src = hlsUrl; vid.play().catch(e=>status('native blocked: '+e.name));
    } else { status('no HLS support'); }
  };
  if(window.Hls){ start(); return; }
  const s = document.createElement('script');
  s.src = '/hls.min.js';
  s.onload = start;
  s.onerror = () => { status('FAILED to load /hls.min.js'); hlsActive=false; };
  document.head.appendChild(s);
}
// tap-to-start fallback for autoplay policies
vid.addEventListener('click', ()=>vid.play().catch(()=>{}));
useWebRTC();   // [spike] WebRTC first, HLS fallback inside

// ---- Unlock ----
$('unlock').onclick = async () => {
  status('unlocking…');
  try {
    const r = await fetch(`/unlock`, {method:'POST', headers:{'X-API-Key':KEY}});
    status(r.ok ? 'unlocked ✓' : 'unlock failed');
  } catch(e){ status('unlock error'); }
};

// ---- Mute (incoming door audio = the HLS <video> element) ----
let muted=false;
$('mute').onclick = () => {
  muted=!muted; vid.muted=muted;
  $('mute').classList.toggle('muted',muted);
  $('mute').querySelector('.icon').textContent = muted?'🔇':'🔊';
};

// ---- Uplink: mic -> 16k PCM -> WebSocket /talk/ws ----
let ws=null, audioCtx=null, micStream=null, node=null, talking=false;
let analyser=null, meterRAF=0;
const TARGET_RATE=16000;
const micBars = () => Array.from(document.querySelectorAll('#micbars i'));

function startMicMeter(){
  const buf = new Uint8Array(analyser.frequencyBinCount);
  const bars = micBars();
  const tick = () => {
    if(!analyser){ return; }
    analyser.getByteFrequencyData(buf);
    // RMS-ish level 0..1 across the low/voice bins
    let sum=0; const n=Math.min(buf.length,32);
    for(let i=0;i<n;i++){ sum += buf[i]*buf[i]; }
    const level = Math.min(1, Math.sqrt(sum/n)/110);
    bars.forEach((b,i)=>{
      // each bar a bit taller than the last; scaled by current level + idle floor
      const peak = level * (0.5 + i*0.16);
      b.style.height = (3 + peak*15).toFixed(1)+'px';
    });
    meterRAF = requestAnimationFrame(tick);
  };
  tick();
}
function stopMicMeter(){
  if(meterRAF) cancelAnimationFrame(meterRAF); meterRAF=0;
  $('micind').classList.remove('on');
  micBars().forEach(b=>b.style.height='3px');
}

async function startTalk(){
  if(talking) return;
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
  }catch(e){ status('mic denied'); return; }
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/talk/ws?key=${encodeURIComponent(KEY)}&rate=${TARGET_RATE}`);
  ws.binaryType='arraybuffer';
  ws.onopen = () => { status('talking…'); };
  ws.onclose = e => { status(talking?('talk closed ('+e.code+')'):'live'); stopTalk(true); };
  ws.onerror = () => status('talk ws error');
  ws.onmessage = ev => { /* {event:talk_started} etc */ };

  const src = audioCtx.createMediaStreamSource(micStream);
  // Live mic indicator: AnalyserNode tapped off the same mic source drives the
  // level bars from your ACTUAL voice (like DMSS), not a fake animation.
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  $('micind').classList.add('on');
  startMicMeter();
  // ScriptProcessor (broad support); resample ctx.sampleRate -> 16k, float->int16
  node = audioCtx.createScriptProcessor(4096,1,1);
  let resampleBuf=[];
  const ratio = audioCtx.sampleRate / TARGET_RATE;
  node.onaudioprocess = e => {
    if(!ws || ws.readyState!==1) return;
    const inp = e.inputBuffer.getChannelData(0);
    // simple linear resample to 16k
    const outLen = Math.floor(inp.length/ratio);
    const out = new Int16Array(outLen);
    for(let i=0;i<outLen;i++){
      const s = inp[Math.floor(i*ratio)];
      out[i] = Math.max(-32768, Math.min(32767, s*32767));
    }
    ws.send(out.buffer);
  };
  src.connect(node); node.connect(audioCtx.destination);
  talking=true; $('talk').classList.add('on');
}
function stopTalk(fromClose){
  talking=false; $('talk').classList.remove('on');
  stopMicMeter();
  try{ if(ws && !fromClose && ws.readyState===1){ ws.send(JSON.stringify({cmd:'stop'})); ws.close(); } }catch(e){}
  try{ node && node.disconnect(); }catch(e){}
  try{ analyser && analyser.disconnect(); }catch(e){}
  try{ micStream && micStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  try{ audioCtx && audioCtx.close(); }catch(e){}
  ws=null; node=null; micStream=null; audioCtx=null; analyser=null;
  if(!fromClose) status('live');
}
// toggle talk (tap to start, tap to stop — duplex stays open while on)
$('talk').onclick = () => { talking ? stopTalk(false) : startTalk(); };
</script>
</body>
</html>
