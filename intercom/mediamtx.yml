# Minimal mediamtx config: RTSP server for the front-door H264 passthrough feed.
logLevel: info
logDestinations: [stdout]

# RTSP on 8554 (TCP). The proxy publishes to rtsp://127.0.0.1:8554/frontdoor;
# clients (Home Assistant / go2rtc) read the same URL.
rtsp: yes
rtspAddress: :8554
protocols: [tcp]

# HLS on for the /talk-ui duplex page (browser plays video+audio together).
# Standard (mpegts) HLS — broadest browser/hls.js compatibility (LL-HLS fMP4
# was rejected by iOS Safari native player). Reliable, but HLS is file/segment
# based so it has an inherent latency floor ≈ segmentDuration × segments-behind.
# Tuned for low latency: 1s segments, minimum count. With hls.js
# liveSyncDurationCount:1 (talk_ui.html) this gives ~1–1.5s downlink delay
# (was ~3s at the mediamtx defaults + liveSyncDurationCount:3).
hls: yes
hlsAddress: :8888
hlsVariant: mpegts
hlsAlwaysRemux: yes
hlsSegmentCount: 3          # minimum mpegts needs; fewer = closer to live edge
# NOTE: do NOT force hlsSegmentDuration below the stream's keyframe interval.
# Segments must start on a keyframe; the door's GOP is ~2s, so a 1s request
# produced variable 2s/3s segments and an "iOS clients" warning. Let mediamtx
# align to the GOP. The latency win comes from hls.js liveSyncDurationCount:1
# (talk_ui.html) keeping the player one segment behind the live edge (~2s).

# WebRTC (WHEP) — low-latency (<1s) downlink for the /talk-ui page. SPIKE.
# Signaling (HTTP) is proxied same-origin via the app's /whep route (through
# Traefik = HTTPS, no mixed-content). Media is UDP and self-encrypted (DTLS-SRTP,
# no cert needed) on webrtcLocalUDPAddress, exposed directly on the container.
# Phone reaches 192.168.20.203 both on home-LAN and over Tailscale (subnet router
# advertises 192.168.20.0/24), so ONE advertised host covers both.
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: [192.168.20.203]
webrtcIPsFromInterfaces: no   # advertise only the host above (avoid docker-internal 172.x ICE candidates)
rtmp: no
srt: no

paths:
  frontdoor:
    # published to by the proxy's ffmpeg; no auth (container-internal + LAN behind traefik)
    source: publisher
  frontdoor_webrtc:
    # second publish from the same ffmpeg: H264 copy + OPUS audio, for WebRTC/WHEP
    # (and the future go2rtc / HA Advanced Camera Card). WebRTC can't carry the
    # AAC on 'frontdoor'; this Opus path is the WebRTC-compatible feed.
    source: publisher
